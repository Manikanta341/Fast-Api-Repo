<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="curd.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 class="table-title">Manage Mobiles</h2>
            <button class="btn add">Add Mobiles</button>
        </div>
        <table class="table table-striped">
             <thead>
                <tr>
                <th>Mobile</th>
                <th>Price(Rs)</th>
                <th>RAM</th>
                <th>Storage</th>
                <th></th>
                <th></th>
                </tr>
              </thead>  
                <tbody>
                    <tr>
                        <td>Samsung</td>
                        <td>25000</td>
                        <td>4GB</td>
                        <td>128</td>
                        <td><button id="edit" class="btn btn-success">edit</button></td>
                        <td><button id="delete" class="btn btn-danger">delete</button></td>
                    </tr>
                    <tr>
                        <td>RealMe</td>
                        <td>5000</td>
                        <td>8GB</td>
                        <td>128</td>
                        <td><button id="edit" class="btn btn-success">edit</button></td>
                        <td><button id="delete" class="btn btn-danger">delete</button></td>    
                    </tr>
                </tbody>
             
        </table>
    </div>
 
    <form class="form-wrapper">
        <div class="mobileform">
            <div class="heading">
                <h2>Edit the Mobile Form</h2>
            </div>
           <div class="group">
              <label>Mobile</label>
              <input type="text" class="form-control" required maxlength="50" id="mobile">
            </div>
            <div class="group">
               <label>Price</label>
               <input type="text" class="form-control"  id="price"required min=1000>
            </div>
            <div class="group">
               <label>RAM</label>
               <input type="text" class="form-control" id="ram" required>
            </div>

            <div class="group">
               <label>Storage</label>
               <input type="text" class="form-control" id="storage" required>
            </div>
            <div class="action">
              <button type="button" class="btn btn-success"  id="save">Save Changes</button>
              <button  type="button" class="btn btn-danger" id="cancel">Cancel</button>
            </div>
    </div>
       
    </form>
    <script src="curd.js"></script>
</div>
</body>    
</body>
</html>
