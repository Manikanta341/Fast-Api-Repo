<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page For Form</title>
</head>
<body>
    <from>
        Name:<input type="text" placeholder="Enter Name" pattern="[A-Za-z]{3}" ><br>
        Password:<input type="password" placeholder="Enter Password" disabled><br>
        Email:<input type="email" placeholder="Enter Email" pattern="[a-z]{7}" required><br>
        <p>Gender</p><br>
        <input type="radio" name="Gender" >Male<br>
        <input type="radio" name="Gender" checked>Female<br>
        <p>Hobbies</p>
        <input type="checkbox" >Reading<br>
        <input type = "checkbox" >Watching<br>
        <input type="checkbox" >writing<br>
        <textarea rows="4" cols="10" placeholder="Enter your details"></textarea><br>
        <p>select country</p>
        <select>
            <option>India</option>
            <option>US</option>
            <option>Australia</option>
        </select><br>
        <button type="submit">submit</button><br>
        <button type="reset">reset</button>

    </from>
</body>
</html>
