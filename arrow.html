<!DOCTYPE html>

<head>

    <title>Arrow Functions</title>
</head>
<body>
    <script>
         
        let sum = (a,b)=>{ return a+b }
        console.log(sum(2,6))

      let square = (a) => a*a
      console.log(square(8))
