<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="registration.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="header">
             <h3>Registration Form</h3>
        </div>
        
        <form  action="index1.html" class="form" id="form">
             <div class="field">
                <label for="name">Username</label>
                <input type="text" id="uname">
                <span class="material-symbols-outlined success">check_circle</span>
                <span class="material-symbols-outlined error">error</span>
                <small>Error Message</small>
             </div>
             <div class="field">
                <label >Email</label>
                <input type="email" id="email">
                <span class="material-symbols-outlined success">check_circle</span>
                <span class="material-symbols-outlined error">error</span>
                <small>Error Message</small>
             </div>
             <div class="field">
                <label>Password</label>
                <input type="password" id="password">
                <span class="material-symbols-outlined success">check_circle</span>
                <span class="material-symbols-outlined error">error</span>
                <small>Error Message</small>
             </div>
              <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="cpassword">
                <span class="material-symbols-outlined success">check_circle</span>
                <span class="material-symbols-outlined error">error</span>
                <small>Error Message</small>
             </div>
             <div class="field">
                <input type="checkbox" id="tc" class="terms">
                <label> Agree the Terms and conditions</label>
                <small>Error Message</small>
             </div>
             <input type="submit" class="button">
            </form>
    </div>
    <script src="validation.js"></script>
</body>
</html>
