<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <link href="password.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="container">
        
           <h2>Secure Password Generator</h2>
           <input type="text" name="password" id="password" readonly>
      
        <div class="control">
            <input type="number" min="6" max="20" value="6" id="tv">
            <button id="generate" class="btn" onclick="getGenerator()" >Generate</button>
            <button id="copy" class="btnCopy" onclick="getCopy()">Copy</button>
        </div>
        
    </div>
    <script>
        function getGenerator()
        {   
            let targetValue = document.getElementById("tv").value
            let str= "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*"
            let password =""
            
          for(let i=0;i<targetValue;i++)
          {
              password+=str.charAt(Math.floor( Math.random()*str.length))
          }
          document.getElementById("password").value=password
        }
        function getCopy() {
    let passwordField = document.getElementById("password").value

    navigator.clipboard.writeText(passwordField)
        .then(() => alert("Copied"))
        .catch(err => console.error("Error copying: ", err))
}
    </script>
</body>
</html>
