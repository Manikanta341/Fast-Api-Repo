<!DOCTYPE html>
<html>
<head>
<style>

body {
  text-align: center;   /* keeps whole form in center */
}

.form-container {
  width: 300px;
  margin: auto;        /* center the form box */
  text-align: left;    /* align label + input to left */
}

label {
  display: block;
  margin-bottom: 5px;
}

input {
  width: 100%;
  border: none;
  border-bottom: 2px solid black;
  outline: none;
  margin-bottom: 20px;
}

</style>
</head>
<body>

<div class="form-container">
  <h2 style="text-align:center;">Student Registration Form</h2>

  <label>Name</label>
  <input type="text">

  <label>Email</label>
  <input type="email">

  <label>Password</label>
  <input type="password">
</div>

</body>
</html>
